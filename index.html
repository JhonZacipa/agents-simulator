<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DT-DSD Agent Simulator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<div class="app">

    <!-- Header -->
    <header class="glass">
        <div>
            <h1>DT-DSD Agent Simulator</h1>
            <p>Discrete-Time Distributed Smith Dynamics &mdash; Multi-Agent Formation Control</p>
        </div>
        <div class="status-bar">
            <span class="status-dot" id="status-dot"></span>
            <span id="status-text">Ready</span>
        </div>
    </header>

    <!-- Main content -->
    <div class="content">

        <!-- Left panel -->
        <div class="left-panel">

            <!-- Formation selection -->
            <div class="panel-section glass">
                <h2>Formation</h2>
                <div class="radio-group">
                    <label>
                        <input type="radio" name="formation" value="vertical_line" checked />
                        Vertical Line
                    </label>
                    <label>
                        <input type="radio" name="formation" value="triangle" />
                        Triangle
                    </label>
                    <label>
                        <input type="radio" name="formation" value="pentagon" />
                        Pentagon
                    </label>
                </div>
            </div>

            <!-- Formation preview -->
            <div class="panel-section glass">
                <h2>Preview</h2>
                <canvas id="preview-canvas" width="160" height="160"></canvas>
            </div>

            <!-- Network topology -->
            <div class="panel-section glass" style="flex:1;">
                <h2>Network Topology</h2>
                <svg id="network-graph" xmlns="http://www.w3.org/2000/svg"></svg>
                <p style="font-size:0.62rem; color:rgba(255,255,255,0.35); margin-top:8px; line-height:1.5;">
                    Click an edge to toggle<br>agent communication links.
                </p>
            </div>

        </div>

        <!-- Right panel -->
        <div class="right-panel">

            <!-- Simulation canvas -->
            <div class="sim-wrapper glass">
                <div class="sim-header">
                    <h2>Simulation Space</h2>
                    <span style="font-size:0.65rem; color:rgba(255,255,255,0.35);">351 x 241 cm</span>
                </div>
                <div class="sim-canvas-wrap">
                    <canvas id="sim-canvas"></canvas>
                </div>
                <div class="progress-wrap">
                    <div class="progress-track">
                        <div class="progress-fill" id="progress-bar"></div>
                    </div>
                    <div id="progress-label">Step 0 / 350</div>
                </div>
            </div>

            <!-- Controls -->
            <div class="controls glass">
                <button class="btn primary" id="start-btn">Start</button>
                <button class="btn" id="restart-btn">Restart</button>
                <span class="info-text">5 agents &bull; DT-DSD controller</span>
            </div>

        </div>
    </div>
</div>

<!-- Scripts (order matters) -->
<script src="js/math_utils.js"></script>
<script src="js/formations.js"></script>
<script src="js/controller.js"></script>
<script src="js/agents.js"></script>
<script src="js/simulator.js"></script>
<script src="js/app.js"></script>
</body>
</html>
